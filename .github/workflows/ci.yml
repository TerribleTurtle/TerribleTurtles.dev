name: CI/CD Checkpoint

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run Typecheck
        run: npm run typecheck

      - name: Run ESLint
        run: npm run lint:js

      - name: Run Stylelint
        run: npm run lint:css

      - name: Verify Build
        run: npm run build

      - name: Run Accessibility Audit
        run: |
          npm run preview &
          npx wait-on http://localhost:4321/
          npx @axe-core/cli http://localhost:4321/ http://localhost:4321/test-bitrot/ http://localhost:4321/404 http://localhost:4321/tools/test-utility/
